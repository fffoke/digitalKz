name: tildes

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tildes}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tildes}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-tildes}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-20160}
      # токен HuggingFace для скачивания моделей (whisper/KazLLM)
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      # LLM-провайдер (stub | ollama). Для ollama с хоста: http://host.docker.internal:11434
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434}
      LLM_MODEL: ${LLM_MODEL:-issai/llama-3.1-kazllm-1.0-8b}
      # модель распознавания речи (для STT_PROVIDER=local): small … large-v3
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      # STT-провайдер: local (faster-whisper) | openai (gpt-4o-transcribe)
      STT_PROVIDER: ${STT_PROVIDER:-local}
      # OpenAI (для LLM_PROVIDER=openai и/или STT_PROVIDER=openai)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_STT_MODEL: ${OPENAI_STT_MODEL:-gpt-4o-transcribe}
    # применяем миграции и поднимаем сервер с автоперезагрузкой
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app"
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app          # код для hot-reload
      - hf_cache:/root/.cache    # кэш скачанных моделей whisper между перезапусками
    depends_on:
      db:
        condition: service_healthy

  user-web:
    build:
      context: ../frontend/user-web/main
    command: npm run dev -- --host 0.0.0.0
    environment:
      CHOKIDAR_USEPOLLING: "true"   # надёжный watch внутри Docker на macOS
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/user-web/main:/app   # код для hot-reload
      - /app/node_modules                # сохраняем node_modules из образа
    depends_on:
      - backend

  admin-web:
    build:
      context: ../frontend/admin-web
    command: npm run dev -- --host 0.0.0.0
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5174:5173"
    volumes:
      - ../frontend/admin-web:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  hf_cache:
